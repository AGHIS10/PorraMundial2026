name: Actualizar Porra

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */2 * * *"

permissions:
  contents: write

jobs:
  actualizar:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Instalar Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Actualizar resultados
        env:
          FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
        run: python scripts/actualizar_resultados.py

      - name: Ejecutar clasificacion
        run: python scripts/calcular_clasificacion.py

      - name: Generar evolucion del torneo
        run: python scripts/generar_evolucion.py

      - name: Calcular proyeccion del campeonato
        run: python scripts/calcular_proyeccion.py

      - name: Sincronizar frontend
        run: python scripts/sync_frontend.py

      - name: Generar estado del sistema
        run: python scripts/generar_status.py

      - name: Commit y push cambios
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -A

          if git diff --staged --quiet; then
            echo "No hay cambios que commitear"
          else
            git commit -m "Actualizar clasificacion"
            git push
          fi
